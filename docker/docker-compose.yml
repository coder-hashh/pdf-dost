services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - app_storage:/app/storage
    environment:
      - DATABASE_URL=file:/app/storage/dev.db
    env_file:
      - ../.env.local

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  app_storage:
