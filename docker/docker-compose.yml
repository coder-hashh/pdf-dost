services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env.local

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pdfguru
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pdfguru123}
      POSTGRES_DB: pdfguru
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfguru -d pdfguru"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  app_storage:
  postgres_data:
